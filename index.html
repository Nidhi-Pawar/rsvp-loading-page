<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Response Recorded</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 80px;
      background: #f4f6f8;
      min-height: 100vh;
    }
    .card {
      background: #ffffff;
      padding: 36px 28px;
      border-radius: 14px;
      display: inline-block;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 340px;
      width: 90%;
    }
    h2 { color: #155e57; margin-bottom: 10px; font-size: 20px; }
    p  { color: #555; font-size: 14px; line-height: 1.6; margin-top: 8px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #155e57;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .badge {
      font-size: 36px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Shown while Apps Script is being called -->
    <div id="loading">
      <div class="spinner"></div>
      <h2>Recording your response…</h2>
      <p>Just a moment!</p>
    </div>

    <!-- Shown on success -->
    <div id="done" class="hidden">
      <div class="badge">✅</div>
      <h2>Thank you!</h2>
      <p>Your response has been recorded.</p>
      <p style="color:#aaa; font-size:12px; margin-top:16px;">You can close this tab.</p>
    </div>

    <!-- Shown if something goes wrong -->
    <div id="error" class="hidden">
      <div class="badge">⚠️</div>
      <h2>Something went wrong</h2>
      <p>Please try clicking the button in the email again.</p>
    </div>

  </div>

  <script>
    // ——— REPLACE THIS WITH YOUR APPS SCRIPT URL ———
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4F7MgElFnvvrKrwDkZmXdWBm6rdtynNI1MzMZdLxodqO1XAB4QxmWAfMMvQHPmKYozg/exec";
    // ———————————————————————————————————————————

    const params = new URLSearchParams(window.location.search);

    // Build the full Apps Script URL with all params from the email link
    const callURL = APPS_SCRIPT_URL + "?" + params.toString();

    fetch(callURL, { mode: "no-cors" })
      .then(() => {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("done").classList.remove("hidden");
      })
      .catch(() => {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("error").classList.remove("hidden");
      });
  </script>

</body>
</html>
